openapi: 3.1.0
info:
  title: Go Offchain API
  version: 0.1.0
  description: ChainLedger 的 Go Web3 链下练习 API。
servers:
  - url: /
paths:
  /healthz:
    get:
      summary: 检查 HTTP 服务是否存活
      operationId: health
      responses:
        "200":
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /chain/head:
    get:
      summary: 查询 EVM 节点最新区块号
      operationId: chainHead
      responses:
        "200":
          description: 最新区块号
          content:
            application/json:
              schema:
                type: object
                required: [block_number]
                properties:
                  block_number:
                    type: integer
                    format: uint64
                    minimum: 0
                    example: 123456
        "502":
          description: EVM JSON-RPC 请求失败
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
